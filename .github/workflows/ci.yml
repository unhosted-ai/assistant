name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # The core has no runtime deps; tests run on plain Python.
      - name: Run tests
        run: python tests/test_assistant.py
      - name: Check it installs + the `ua` command works
        run: |
          pip install .
          ua --skills
